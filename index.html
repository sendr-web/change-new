<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 格式转换交互原型</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 隐藏滚动条 */
    ::-webkit-scrollbar { display: none; }

    /* 补充 Tailwind 插件动画 */
    @keyframes slideInUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInFromBottom {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-slide-up { animation: slideInUp 0.3s ease-out forwards; }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    .animate-chat-entry { animation: slideInFromBottom 0.5s ease-out forwards; }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Sparkles, 
      Network, 
      Presentation, 
      Share2, 
      Maximize2, 
      Download,
      FileText,
      Loader2,
      X,
      ChevronDown,
      LayoutGrid,
      PlusCircle
    } from 'lucide-react';

    function App() {
      const [messages, setMessages] = useState([]);
      const [hasStartedChat, setHasStartedChat] = useState(false);
      const [showActionSheet, setShowActionSheet] = useState(false);
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const handleConvertClick = () => {
        setShowActionSheet(true);
      };

      const handleFormatSelect = (format) => {
        setShowActionSheet(false);
        setHasStartedChat(true);
        
        const aiLoadingId = Date.now();
        setMessages([
          {
            id: aiLoadingId,
            sender: 'ai',
            status: 'loading',
            text: '正在为您抽取核心结构...'
          }
        ]);

        setTimeout(() => {
          setMessages(prev => prev.map(msg => 
            msg.id === aiLoadingId 
              ? {
                  ...msg,
                  status: 'success',
                  text: '转换完成！这是为您生成的预览：',
                  cardType: format.type,
                  cardTitle: `当前文档 - ${format.name}`
                }
              : msg
          ));
        }, 2500);
      };

      const formatOptions = [
        { id: 'mindmap', name: '思维导图', type: 'mindmap', icon: <Network className="w-5 h-5 text-blue-500" />, desc: '梳理逻辑层级与分支关系' },
        { id: 'ppt', name: '演示文稿 (PPT)', type: 'ppt', icon: <Presentation className="w-5 h-5 text-[#f97316]" />, desc: '生成幻灯片大纲与排版' },
        { id: 'flowchart', name: '流程图', type: 'flowchart', icon: <Share2 className="w-5 h-5 text-[#22c55e]" />, desc: '展示步骤与流转过程' },
      ];

      return (
        <div className="flex justify-center bg-gray-100 min-h-screen font-sans items-center">
          <div className="w-full max-w-md bg-[#1C1C1E] relative flex flex-col h-screen sm:h-[800px] sm:rounded-[40px] overflow-hidden shadow-2xl sm:border-[6px] border-black ring-1 ring-gray-800">
            
            {/* iOS Status Bar */}
            <div className="flex justify-between items-center px-7 pt-4 pb-2 text-white text-[14px] font-semibold shrink-0">
              <span>9:41</span>
              <div className="flex space-x-1.5 items-center">
                <div className="w-4 h-3.5 flex items-end space-x-[2px]"><div className="w-1 h-1.5 bg-white rounded-sm"></div><div className="w-1 h-2.5 bg-white rounded-sm"></div><div className="w-1 h-3.5 bg-white rounded-sm"></div></div>
                <div className="w-6 h-3 border border-white/40 bg-white/20 rounded-[4px] p-[1px] relative"><div className="w-[80%] h-full bg-white rounded-[2px]"></div><div className="absolute -right-1 top-1 w-0.5 h-1 bg-white/40 rounded-r-sm"></div></div>
              </div>
            </div>

            {/* AI Panel Container */}
            <div className="flex-1 bg-white rounded-t-[32px] mt-2 flex flex-col overflow-hidden relative shadow-[0_-8px_30px_rgba(0,0,0,0.12)]">
              
              {/* Header */}
              <div className="flex items-center justify-center px-4 py-5 bg-white z-10 sticky top-0 relative">
                <div className="flex items-center space-x-1 cursor-pointer">
                  <h1 className="text-[17px] font-semibold text-gray-900">AI文档助手</h1>
                  <ChevronDown className="w-5 h-5 text-gray-900" />
                </div>
              </div>

              {/* Content Area */}
              <div className="flex-1 overflow-y-auto p-5 bg-white scrollbar-hide">
                {!hasStartedChat ? (
                  <div className="mt-4 animate-chat-entry">
                    <h2 className="text-[28px] font-bold text-gray-900 mb-2 tracking-tight">Hi, 有什么可以帮你？</h2>
                    <p className="text-gray-500 text-[14px] mb-8">你似乎在浏览一份入学信息统计表，我可以帮你</p>
                    
                    <div className="space-y-3">
                      <button className="w-full text-left px-5 py-4 bg-[#F5F6F8] hover:bg-gray-100 rounded-2xl text-[15px] text-gray-800 transition-colors">根据表格内容提供3个关键洞察</button>
                      <button className="w-full text-left px-5 py-4 bg-[#F5F6F8] hover:bg-gray-100 rounded-2xl text-[15px] text-gray-800 transition-colors">优化表头高度和字体样式</button>
                      <button className="w-full text-left px-5 py-4 bg-[#F5F6F8] hover:bg-gray-100 rounded-2xl text-[15px] text-gray-800 transition-colors">加粗所有带人名的单元格</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-6 pb-4">
                    {messages.map((msg) => (
                      <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} animate-chat-entry`}>
                        {msg.sender === 'ai' && (
                          <div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shrink-0 mr-3 mt-1 shadow-sm">
                            <Sparkles className="w-4 h-4" />
                          </div>
                        )}

                        <div className={`max-w-[85%] ${msg.sender === 'user' ? 'items-end' : 'items-start'} flex flex-col`}>
                          {(msg.text || msg.status === 'loading') && (
                            <div className={`relative px-4 py-3 text-[15px] leading-relaxed shadow-sm ${msg.sender === 'user' ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm' : 'bg-white text-gray-800 border border-gray-100 rounded-2xl rounded-tl-sm whitespace-pre-wrap'}`}>
                              {msg.status === 'loading' ? (
                                <div className="flex items-center text-gray-500">
                                  <Loader2 className="w-4 h-4 mr-2 animate-spin text-blue-500" />
                                  {msg.text}
                                </div>
                              ) : msg.text}
                            </div>
                          )}

                          {msg.cardType && (
                            <div className="mt-3 w-full w-[280px] sm:w-[320px] bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm animate-chat-entry">
                              <div className="px-4 py-3 flex items-center border-b border-gray-100 bg-gray-50/50">
                                {msg.cardType === 'mindmap' ? <Network className="w-4 h-4 text-blue-500 mr-2" /> : <Presentation className="w-4 h-4 text-orange-500 mr-2" />}
                                <span className="text-sm font-medium text-gray-700 truncate">{msg.cardTitle}</span>
                              </div>
                              <div className="h-36 bg-gray-100 relative overflow-hidden flex items-center justify-center p-4">
                                {msg.cardType === 'mindmap' ? (
                                  <div className="w-full h-full border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-white/50 backdrop-blur-sm">
                                    <div className="flex items-center">
                                        <div className="w-16 h-8 bg-blue-100 border border-blue-300 rounded-md flex items-center justify-center text-[10px] text-blue-700 font-medium">中心主题</div>
                                        <div className="w-8 h-0.5 bg-gray-300"></div>
                                        <div className="flex flex-col space-y-2">
                                          <div className="flex items-center"><div className="w-4 h-0.5 bg-gray-300"></div><div className="w-12 h-6 bg-white border border-gray-200 rounded text-[8px] flex items-center justify-center text-gray-600 shadow-sm">分支 1</div></div>
                                          <div className="flex items-center"><div className="w-4 h-0.5 bg-gray-300"></div><div className="w-12 h-6 bg-white border border-gray-200 rounded text-[8px] flex items-center justify-center text-gray-600 shadow-sm">分支 2</div></div>
                                        </div>
                                    </div>
                                  </div>
                                ) : (
                                  <div className="w-full h-full flex space-x-2 items-center justify-center">
                                    <div className="w-24 h-16 bg-white border border-gray-300 shadow-sm rounded-sm p-1 flex flex-col z-10 scale-110">
                                      <div className="w-3/4 h-2 bg-blue-600 rounded-sm mx-auto mt-2 mb-2"></div>
                                      <div className="w-full flex space-x-1 px-1">
                                          <div className="w-1/2 h-6 bg-gray-100 rounded-sm"></div>
                                          <div className="w-1/2 h-6 bg-gray-100 rounded-sm"></div>
                                        </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                              <div className="grid grid-cols-2 divide-x divide-gray-100 bg-white">
                                <button className="flex items-center justify-center py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition-colors">
                                  <Maximize2 className="w-4 h-4 mr-2 text-gray-500" /> 预览
                                </button>
                                <button className="flex items-center justify-center py-3 text-sm font-medium text-blue-600 hover:bg-blue-50 active:bg-blue-100 transition-colors">
                                  <Download className="w-4 h-4 mr-2" /> 导出
                                </button>
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                    <div ref={messagesEndRef} />
                  </div>
                )}
              </div>

              {/* Footer Input */}
              <div className="bg-white px-4 pb-8 pt-2 z-10 shrink-0 flex flex-col">
                <div className="flex items-center space-x-3 mb-4 overflow-x-auto scrollbar-hide">
                  <button onClick={handleConvertClick} className="flex items-center bg-white border border-gray-200 shadow-sm text-gray-700 text-[14px] px-4 py-2 rounded-[20px] hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap">
                    <Sparkles className="w-[16px] h-[16px] mr-1.5 text-gray-700" /> 格式转化
                  </button>
                  <button className="flex items-center bg-white border border-gray-200 shadow-sm text-gray-700 text-[14px] px-4 py-2 rounded-[20px] hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap">
                    <FileText className="w-[16px] h-[16px] mr-1.5 text-gray-700" /> 总结摘要
                  </button>
                </div>
                <div className="bg-white rounded-[28px] h-[52px] px-2 flex items-center justify-between border border-gray-200 shadow-sm">
                  <button className="w-10 h-10 flex items-center justify-center text-gray-800 hover:bg-gray-100 rounded-full transition-colors">
                    <LayoutGrid className="w-[22px] h-[22px]" />
                  </button>
                  <div className="flex-1 text-center text-gray-900 font-medium text-[15px]">按住 说话</div>
                  <button className="w-10 h-10 flex items-center justify-center text-gray-800 hover:bg-gray-100 rounded-full transition-colors">
                    <PlusCircle className="w-[22px] h-[22px]" />
                  </button>
                </div>
              </div>
            </div>

            {/* Action Sheet */}
            {showActionSheet && (
              <div className="absolute inset-0 z-40">
                <div className="absolute inset-0 bg-black/40 animate-fade-in" onClick={() => setShowActionSheet(false)} />
                <div className="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-2xl z-50 animate-slide-up">
                  <div className="p-5 pb-8">
                    <div className="flex items-center justify-between mb-5 px-1">
                      <h3 className="text-[18px] font-bold text-[#1f2329]">将文本转换为...</h3>
                      <button onClick={() => setShowActionSheet(false)} className="p-1.5 text-gray-400 hover:bg-gray-100 rounded-full transition-colors">
                        <X className="w-5 h-5" />
                      </button>
                    </div>
                    <div className="space-y-3">
                      {formatOptions.map(opt => (
                        <button key={opt.id} onClick={() => handleFormatSelect(opt)} className={`w-full flex items-center p-4 rounded-[20px] border transition-all text-left group ${opt.id === 'mindmap' ? 'border-[#B2CCFF] bg-[#F4F8FF]' : 'border-gray-100 bg-white'}`}>
                          <div className="w-[42px] h-[42px] bg-white rounded-xl shadow-sm flex items-center justify-center shrink-0 mr-4 group-hover:scale-105 transition-transform">
                            {opt.icon}
                          </div>
                          <div>
                            <div className="font-bold text-[#1f2329] text-[16px] mb-0.5">{opt.name}</div>
                            <div className="text-[13px] text-gray-500">{opt.desc}</div>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}
            {/* iOS Home Indicator */}
            <div className="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full hidden sm:block"></div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
